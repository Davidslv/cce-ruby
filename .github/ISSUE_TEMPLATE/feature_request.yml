name: Feature request
description: Suggest a capability or improvement for CCE.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Because CCE is a clean-room, spec-first project,
        please note whether your request would require a change to SPEC.md — that
        is a bigger decision (it must stay coordinated with the sibling Rust
        implementation). See GOVERNANCE.md and CONTRIBUTING.md.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that CCE does not support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should CCE do? Sketch the command, flag, or behaviour.
    validations:
      required: true

  - type: dropdown
    id: spec-impact
    attributes:
      label: Does this change observable behaviour (a SPEC.md change)?
      options:
        - "No — additive / tooling / docs only"
        - "Yes — it would require a spec revision"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you have tried.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help evaluate the request.
    validations:
      required: false
