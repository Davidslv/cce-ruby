name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Native gems: ruby_tree_sitter needs a C toolchain; sqlite3 links
      # against libsqlite3. See CONTRIBUTING.md ("System dependencies").
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      # The first parse downloads prebuilt tree-sitter grammar dylibs into a
      # local cache. Runners have network access, so this happens during the
      # test run; the suite itself is otherwise hermetic.
      - name: Run tests
        run: bundle exec rake test
